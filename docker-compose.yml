services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task_management_backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8080:8080"
