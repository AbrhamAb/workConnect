services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      # Set this to your Neon connection string in .env (sslmode=require).
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8080:8080"
